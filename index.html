<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8" />
  <title>Hellcastle Golf Tournament</title>
  <style>
        :root {
      --bg: #051d0d;              /* Deep forest green base */
      --panel: rgba(10, 45, 20, 0.85); /* Dark moss green panel */
      --accent: #39ff14;          /* Neon green */
      --accent-soft: #8dff7a;     
      --accent2: #f7b733; 
      --text: #eaffea;            
      --muted: #7fbf7f;           
      --winner: #7dffb2;          
    }

    body {
      margin: 0;
      min-height: 100vh;
      /* Changed from reddish-black to deep green-black gradient */
      background: radial-gradient(circle at top, #0a2e16 0, #031408 55%, #000 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      /* Swapped linear black gradient for deep green */
      background: linear-gradient(145deg, #082411, #020a05);
      border-radius: 16px;
      border: 1px solid rgba(57, 255, 20, 0.3); /* Green border instead of orange */
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 30px rgba(57, 255, 20, 0.15);
      padding: 20px 24px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow effects updated to green */
    .app::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(57, 255, 20, 0.08), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(141, 255, 122, 0.08), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .panel {
      /* Panels now use a green-tinted radial gradient */
      background: radial-gradient(circle at top left, rgba(57, 255, 20, 0.15), rgba(0, 0, 0, 0.8));
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 14px 14px 16px;
      position: relative;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .panel-title span { color: var(--accent2); }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }

    .status-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-label {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-size: 0.7rem;
    }

    .status-value { color: var(--accent2); font-weight: 600; }
    .status-value-strong { color: var(--accent); font-weight: 700; }

    .hole-selector {
      display: flex;
      gap: 5px;
      background: rgba(0,0,0,0.4);
      padding: 4px;
      border-radius: 999px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hole-opt {
      flex: 1;
      padding: 6px;
      text-align: center;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 999px;
      transition: background 0.2s;
      color: var(--muted);
    }

    .hole-opt.active {
      background: var(--accent2);
      color: #000;
      font-weight: bold;
    }

    .hole-opt.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .player-row {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) 0.9fr 0.9fr;
      gap: 6px;
      align-items: center;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid transparent;
      font-size: 0.85rem;
    }

    .player-row.active {
      border-color: rgba(255, 75, 31, 0.9);
      background: radial-gradient(circle at left, rgba(255, 75, 31, 0.35), rgba(0, 0, 0, 0.9));
    }

    .player-total { text-align: right; color: var(--accent2); font-weight: 600; }
    .player-position { text-align: right; color: var(--muted); font-size: 0.75rem; }

    .add-player-row { display: flex; gap: 6px; margin-top: 10px; }

    input[type="text"] {
      flex: 1;
      padding: 7px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.7);
      color: var(--text);
      font-size: 0.85rem;
    }

    button {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(circle at top, rgba(255, 75, 31, 0.9), rgba(255, 75, 31, 0.6));
      color: #fff;
      padding: 7px 12px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: rgba(0, 0, 0, 0.7);
      border-color: rgba(255, 255, 255, 0.18);
      color: var(--muted);
    }

    button:disabled { opacity: 0.4; cursor: default; }

    .score-buttons-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .score-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .scorecard-table-wrapper {
      max-height: 260px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.7);
      margin-top: 10px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    th, td { padding: 6px 8px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
    th { text-transform: uppercase; color: var(--muted); font-size: 0.65rem; }
    
    .winner-banner {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #00ff3c;
      font-size: 0.8rem;
      display: none;
      align-items: center;
      gap: 8px;
      color: #000;
      box-shadow: 0 0 18px #00ff3c;
    }

    .winner-banner.show { display: inline-flex; }

    .next-hole-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 20;
    }
    .next-hole-overlay.show { opacity: 1; }
    .next-hole-banner {
      padding: 18px 26px;
      border-radius: 999px;
      background: radial-gradient(circle at top, rgba(255, 75, 31, 0.95), rgba(0, 0, 0, 0.95));
      border: 2px solid var(--accent2);
      color: #fff;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
        .app { padding: 15px; }
        h1 { font-size: 1.4rem; }
        .scorecard-table-wrapper { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="next-hole-overlay" id="nextHoleOverlay">
      <div class="next-hole-banner">Next Hole Awaits</div>
    </div>

    <header>
      <div class="title-block">
        <h1>Hellcastle Golf</h1>
        <div class="subtitle">Tournament scoring</div>
      </div>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
            <div class="panel-title"><span>Tournament</span> Setup</div>
        </div>
        
        <div class="status-label" style="margin-bottom:5px">Course Length</div>
        <div class="hole-selector" id="holeSelector">
            <div class="hole-opt active" data-holes="3">3 Holes</div>
            <div class="hole-opt" data-holes="9">9 Holes</div>
        </div>

        <div class="panel-body">
          <div class="status-row">
            <div class="status-pill">
              <div class="status-label">Hole</div>
              <div class="status-value" id="statusHole">1 / 3</div>
            </div>
            <div class="status-pill">
              <div class="status-label">Bag</div>
              <div class="status-value" id="statusBag">0 / 4</div>
            </div>
          </div>

          <div class="players-list" id="playersList"></div>

          <div class="add-player-row">
            <input type="text" id="playerNameInput" placeholder="Add player…" />
            <button id="addPlayerBtn">Add</button>
          </div>

          <div style="margin-top:15px">
            <button class="secondary" style="width:100%" id="resetBtn">Reset Tournament</button>
          </div>

          <div class="winner-banner" id="winnerBanner">
            <span id="winnerText"></span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div class="panel-title"><span>Scoring</span> & Scorecard</div>
        </div>
        <div class="panel-body">
          <div class="score-meta-row">
            <div><strong id="currentHoleLabel">Hole 1</strong></div>
            <div>Bags: <span id="bagCounter">0</span> / 4</div>
          </div>

          <div class="score-buttons-grid">
            <button data-score="1" class="score-btn">Bottom (+1)</button>
            <button data-score="3" class="score-btn">Middle (+3)</button>
            <button data-score="2" class="score-btn">Top (+2)</button>
            <button data-score="4" class="score-btn">On Board (+4)</button>
            <button data-score="5" class="score-btn" style="grid-column: span 2; background: #5b0b0b;">Off Board (+5)</button>
          </div>

          <div style="display:flex; gap:8px">
            <button class="secondary" id="undoBtn" style="flex:1">Undo</button>
            <button id="nextPlayerBtn" style="flex:2">Next Player</button>
          </div>

          <div class="scorecard-table-wrapper">
            <table>
              <thead id="scorecardHead"></thead>
              <tbody id="scorecardBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // --- STATE ---
    let totalHoles = 3; 
    const BAGS_PER_HOLE = 4;
    const STORAGE_KEY = "hellcastle_golf_v2";

    let players = []; 
    let currentHole = 0; 
    let currentPlayerIndex = 0;
    let currentBagCount = 0;
    let bagHistory = []; 
    let tournamentFinished = false;

    // --- DOM ---
    const playersListEl = document.getElementById("playersList");
    const playerNameInput = document.getElementById("playerNameInput");
    const addPlayerBtn = document.getElementById("addPlayerBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusHoleEl = document.getElementById("statusHole");
    const statusBagEl = document.getElementById("statusBag");
    const currentHoleLabelEl = document.getElementById("currentHoleLabel");
    const bagCounterEl = document.getElementById("bagCounter");
    const scoreButtons = Array.from(document.querySelectorAll(".score-btn"));
    const undoBtn = document.getElementById("undoBtn");
    const nextPlayerBtn = document.getElementById("nextPlayerBtn");
    const scorecardHeadEl = document.getElementById("scorecardHead");
    const scorecardBodyEl = document.getElementById("scorecardBody");
    const winnerBannerEl = document.getElementById("winnerBanner");
    const winnerTextEl = document.getElementById("winnerText");
    const nextHoleOverlayEl = document.getElementById("nextHoleOverlay");
    const holeOpts = document.querySelectorAll(".hole-opt");

    // --- LOGIC ---
    function saveState() {
      const data = { players, currentHole, currentPlayerIndex, currentBagCount, bagHistory, tournamentFinished, totalHoles };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      players = data.players || [];
      currentHole = data.currentHole || 0;
      currentPlayerIndex = data.currentPlayerIndex || 0;
      currentBagCount = data.currentBagCount || 0;
      bagHistory = data.bagHistory || [];
      tournamentFinished = !!data.tournamentFinished;
      totalHoles = data.totalHoles || 3;
      updateHoleSelectorUI();
    }

    function updateHoleSelectorUI() {
        holeOpts.forEach(opt => {
            opt.classList.toggle("active", parseInt(opt.dataset.holes) === totalHoles);
            opt.classList.toggle("disabled", players.length > 0);
        });
    }

    function createPlayer(name) {
      return {
        id: Date.now() + Math.random().toString(16).slice(2),
        name: name.trim(),
        scores: Array(totalHoles).fill(0),
        total: 0
      };
    }

    function renderAll() {
      players.forEach(p => p.total = p.scores.reduce((a, b) => a + b, 0));
      
      statusHoleEl.textContent = `${currentHole + 1} / ${totalHoles}`;
      statusBagEl.textContent = `${currentBagCount} / 4`;
      bagCounterEl.textContent = currentBagCount;
      currentHoleLabelEl.textContent = `Hole ${currentHole + 1}`;
      
      const canScore = players.length > 0 && !tournamentFinished;
      scoreButtons.forEach(btn => btn.disabled = !canScore || currentBagCount >= BAGS_PER_HOLE);
      undoBtn.disabled = !canScore || bagHistory.length === 0;
      nextPlayerBtn.disabled = !canScore || currentBagCount < BAGS_PER_HOLE;

      if (tournamentFinished) nextPlayerBtn.textContent = "Finished";
      else if (currentHole === totalHoles - 1 && currentPlayerIndex === players.length - 1) nextPlayerBtn.textContent = "Finish";
      else if (currentPlayerIndex === players.length - 1) nextPlayerBtn.textContent = "Next Hole";
      else nextPlayerBtn.textContent = "Next Player";

      // Render List
      playersListEl.innerHTML = "";
      players.forEach((p, idx) => {
        const row = document.createElement("div");
        row.className = `player-row ${idx === currentPlayerIndex && !tournamentFinished ? 'active' : ''}`;
        row.innerHTML = `<div>${p.name}</div><div class="player-total">${p.total}</div>`;
        playersListEl.appendChild(row);
      });

      // Render Scorecard
      let head = `<tr><th>Player</th>`;
      for(let i=1; i<=totalHoles; i++) head += `<th>H${i}</th>`;
      head += `<th>Total</th></tr>`;
      scorecardHeadEl.innerHTML = head;

      scorecardBodyEl.innerHTML = players.map(p => `
        <tr>
            <td style="text-align:left">${p.name}</td>
            ${p.scores.map(s => `<td>${s}</td>`).join('')}
            <td style="color:var(--accent2); font-weight:bold">${p.total}</td>
        </tr>
      `).join('');

      if (tournamentFinished && players.length > 0) {
        const winner = [...players].sort((a,b) => a.total - b.total)[0];
        winnerTextEl.textContent = `Champion: ${winner.name} (${winner.total})`;
        winnerBannerEl.classList.add("show");
      } else {
        winnerBannerEl.classList.remove("show");
      }

      updateHoleSelectorUI();
      saveState();
    }

    // --- EVENTS ---
    holeOpts.forEach(opt => {
        opt.addEventListener("click", () => {
            if (players.length > 0) return;
            totalHoles = parseInt(opt.dataset.holes);
            renderAll();
        });
    });

    addPlayerBtn.addEventListener("click", () => {
      const name = playerNameInput.value.trim();
      if (!name) return;
      players.push(createPlayer(name));
      playerNameInput.value = "";
      renderAll();
    });

    scoreButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        const pts = parseInt(btn.dataset.score);
        players[currentPlayerIndex].scores[currentHole] += pts;
        currentBagCount++;
        bagHistory.push({ pIdx: currentPlayerIndex, hIdx: currentHole, pts });
        renderAll();
      });
    });

    undoBtn.addEventListener("click", () => {
      const last = bagHistory.pop();
      players[last.pIdx].scores[last.hIdx] -= last.pts;
      currentBagCount--;
      renderAll();
    });

    nextPlayerBtn.addEventListener("click", () => {
      currentBagCount = 0;
      if (currentPlayerIndex < players.length - 1) {
        currentPlayerIndex++;
      } else if (currentHole < totalHoles - 1) {
        currentHole++;
        currentPlayerIndex = 0;
        nextHoleOverlayEl.classList.add("show");
        setTimeout(() => nextHoleOverlayEl.classList.remove("show"), 900);
      } else {
        tournamentFinished = true;
      }
      renderAll();
    });

    resetBtn.addEventListener("click", () => {
      if(!confirm("Reset everything?")) return;
      players = []; currentHole = 0; currentPlayerIndex = 0; 
      currentBagCount = 0; bagHistory = []; tournamentFinished = false;
      localStorage.removeItem(STORAGE_KEY);
      renderAll();
    });

    loadState();
    renderAll();
  </script>
</body>
</html>
